spring.application.name=teamcollab

# ===========================
# DATASOURCE - H2
# ===========================
spring.datasource.url=jdbc:h2:file:./data/teamcollabdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===========================
# H2 CONSOLE
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===========================
# JWT
# ===========================
app.jwt.secret=${APP_JWT_SECRET:teamcollab_super_secret_key_0168525452_sdfgigfghfg}
app.jwt.expiration=84000000

# ===========================
# SPRINGDOC / SWAGGER
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.pre-loading-enabled=false
springdoc.cache.disabled=false

# ===========================
# LOGGING
# ===========================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springdoc=WARN
logging.level.com.zaxxer.hikari=WARN